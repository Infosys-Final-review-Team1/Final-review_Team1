<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterbox Enterprise - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        
        html, body { height: 100%; overflow-y: auto; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0c4a6e 100%);
            min-height: 100vh;
        }
        
        .premium-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        
        .input-field::placeholder {
            color: #9ca3af;
        }
        
        .primary-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }
        
        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.4);
        }
        
        .primary-btn:active {
            transform: translateY(0);
        }
        
        .secondary-btn {
            border: 2px solid #3b82f6;
            color: #3b82f6;
            transition: all 0.3s ease;
        }
        
        .secondary-btn:hover {
            background: #3b82f6;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }
        
        .logo {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.3);
        }
        
        .input-icon {
            color: #6b7280;
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper input {
            padding-left: 48px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            color: #d1d5db;
            margin: 28px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }
        
        .divider span {
            margin: 0 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .feature-text {
            color: #6b7280;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Decorative Elements -->
    <div class="fixed top-0 left-0 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl -z-10"></div>
    <div class="fixed bottom-0 right-0 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl -z-10"></div>

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md fade-in">
            <!-- Premium Logo Section -->
            <div class="text-center mb-10">
                <div class="logo w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-comments text-white text-3xl"></i>
                </div>
                <h1 class="text-4xl font-bold text-white mb-2">Chatterbox</h1>
                <p class="text-gray-300 text-sm font-medium">Enterprise Communication Platform</p>
            </div>

            <!-- Login Form Card -->
            <div class="premium-card rounded-3xl p-8 mb-6">
                <!-- Greeting -->
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">Welcome Back</h2>
                    <p class="text-gray-600 text-sm">Sign in to your account to continue</p>
                </div>

                <!-- Username Input -->
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" 
                               class="input-field w-full px-4 py-3 rounded-xl text-gray-900"
                               placeholder="Enter your username" required>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="mb-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" 
                               class="input-field w-full px-4 py-3 rounded-xl text-gray-900"
                               placeholder="Enter your password" required>
                    </div>
                </div>

                <!-- Forgot Password Link -->
                <div class="text-right mb-8">
                    <a href="/forgot-password.html" class="text-sm font-semibold text-blue-600 hover:text-blue-700 transition">
                        Forgot password?
                    </a>
                </div>

                <!-- Login Button -->
                <button id="loginBtn" class="primary-btn w-full py-3 rounded-xl text-white font-bold text-base mb-4">
                    Sign In
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>New here?</span>
                </div>

                <!-- Register Button -->
                <a href="/register.html" class="secondary-btn w-full py-3 rounded-xl font-bold text-base flex items-center justify-center space-x-2 text-center">
                    <i class="fas fa-user-plus"></i>
                    <span>Create Account</span>
                </a>
            </div>

            <!-- Footer Info -->
            <div class="text-center">
                <p class="feature-text">Secure • Fast • Reliable</p>
            </div>
        </div>
    </div>

    <div id="message" class="fixed bottom-6 left-1/2 -translate-x-1/2 max-w-md w-full p-4 rounded-2xl font-medium hidden z-50 mx-4"></div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');
        
        loginBtn.addEventListener('click', login);
        
        // Allow Enter key to login
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            const originalContent = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner animate-spin"></i>';
            loginBtn.disabled = true;
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = `/chat.html?username=${encodeURIComponent(username)}`;
                    }, 1500);
                } else {
                    showMessage(data.detail || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                loginBtn.innerHTML = originalContent;
                loginBtn.disabled = false;
            }
        }
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `fixed bottom-6 left-1/2 -translate-x-1/2 max-w-md w-full p-4 rounded-2xl font-medium z-50 mx-4 ${
                type === 'success' 
                    ? 'bg-green-500/90 text-white border border-green-400/50 backdrop-blur-sm shadow-2xl' 
                    : 'bg-red-500/90 text-white border border-red-400/50 backdrop-blur-sm shadow-2xl'
            }`;
            messageDiv.classList.remove('hidden');
            
            if (type === 'success') {
                setTimeout(() => messageDiv.classList.add('hidden'), 3000);
            }
        }
    </script>
</body>
</html>
