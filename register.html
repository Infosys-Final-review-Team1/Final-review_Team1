<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterbox Enterprise - Sign up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .glass { backdrop-filter: blur(40px); background: rgba(255, 255, 255, 0.1); }
        .instagram-gradient {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-pink-900/20 to-rose-900 min-h-screen flex items-center justify-center p-4 relative">
    <!-- Main Form Card - Perfectly Centered -->
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="w-48 h-14 bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 rounded-full flex items-center justify-center mb-8 shadow-2xl instagram-gradient p-2 mx-auto">
            <span class="text-2xl font-bold text-white drop-shadow-lg">Chatterbox</span>
        </div>

        <!-- Register Form -->
        <div class="glass backdrop-blur-xl rounded-3xl p-8 w-full border border-white/20 shadow-2xl">
            <div class="space-y-4">
                <input type="text" id="fullName" 
                       class="w-full h-14 px-4 bg-white/10 rounded-lg text-white placeholder-white/70 border border-white/20 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-base py-3"
                       placeholder="Full Name" required>
                
                <input type="text" id="username" 
                       class="w-full h-14 px-4 bg-white/10 rounded-lg text-white placeholder-white/70 border border-white/20 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-base py-3"
                       placeholder="Username" required>
                
                <input type="password" id="password" 
                       class="w-full h-14 px-4 bg-white/10 rounded-lg text-white placeholder-white/70 border border-white/20 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-base py-3"
                       placeholder="Password" required>
                
                <button id="registerBtn" class="w-full h-14 bg-gradient-to-r from-rose-500 to-pink-600 hover:from-rose-600 hover:to-pink-700 text-white font-bold rounded-lg text-base shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-0.5">
                    Sign up
                </button>
            </div>

            <!-- Divider -->
            <div class="flex items-center my-6">
                <div class="flex-1 h-px bg-white/20"></div>
                <span class="px-4 text-white/50 text-sm font-medium">OR</span>
                <div class="flex-1 h-px bg-white/20"></div>
            </div>

            <!-- Login Link -->
            <a href="/" class="block w-full h-14 border-2 border-white/30 hover:border-white text-white font-bold rounded-lg text-base flex items-center justify-center space-x-2 transition-all duration-300 hover:bg-white/10">
                <i class="fas fa-sign-in-alt"></i>
                <span>Log in</span>
            </a>
        </div>

        <!-- Bottom Links -->
        <div class="mt-8 text-center space-y-4">
            <div class="text-white/60 text-sm">Get the app</div>
            <div class="flex space-x-4 justify-center">
                <div class="w-28 h-8 bg-white/10 backdrop-blur-sm rounded-lg flex items-center justify-center">
                    <i class="fab fa-apple text-white text-sm"></i>
                </div>
                <div class="w-28 h-8 bg-white/10 backdrop-blur-sm rounded-lg flex items-center justify-center">
                    <i class="fab fa-google-play text-white text-sm"></i>
                </div>
            </div>
        </div>

    <div id="message" class="fixed bottom-6 left-1/2 -translate-x-1/2 max-w-md w-full p-4 rounded-2xl font-medium hidden z-50 mx-4"></div>

    <script>
        const registerBtn = document.getElementById('registerBtn');
        const messageDiv = document.getElementById('message');
        
        registerBtn.addEventListener('click', register);
        
        async function register() {
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!fullName || !username || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            const originalContent = registerBtn.innerHTML;
            registerBtn.innerHTML = '<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin mx-auto"></div>';
            registerBtn.disabled = true;
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, full_name: fullName, password })
                });
                
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = `/chat.html?username=${encodeURIComponent(username)}`;
                    }, 1500);
                } else {
                    showMessage(data.detail || 'Registration failed', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                registerBtn.innerHTML = originalContent;
                registerBtn.disabled = false;
            }
        }
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `fixed bottom-6 left-1/2 -translate-x-1/2 max-w-md w-full p-4 rounded-2xl font-medium z-50 mx-4 ${
                type === 'success' 
                    ? 'bg-green-500/90 text-white border border-green-400/50 backdrop-blur-sm shadow-2xl' 
                    : 'bg-red-500/90 text-white border border-red-400/50 backdrop-blur-sm shadow-2xl'
            }`;
            messageDiv.classList.remove('hidden');
            
            if (type === 'success') {
                setTimeout(() => messageDiv.classList.add('hidden'), 3000);
            }
        }
    </script>
</body>
</html>
