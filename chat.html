<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterbox Enterprise - Enhanced Chat</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { 
            font-family: 'Inter', sans-serif; 
            box-sizing: border-box;
        }
        body { 
            margin: 0; 
            padding: 0;
            background: linear-gradient(135deg, #0f0f23 0%, #1a0033 50%, #2d004f 100%);
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        
        /* Glassmorphism */
        .glass { 
            backdrop-filter: blur(40px); 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Scrollbar */
        .scrollbar-thin::-webkit-scrollbar { 
            width: 6px; 
        }
        .scrollbar-thin::-webkit-scrollbar-track { 
            background: transparent; 
        }
        .scrollbar-thin::-webkit-scrollbar-thumb { 
            background: rgba(255,255,255,0.2); 
            border-radius: 3px; 
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { 
            background: rgba(255,255,255,0.3); 
        }
        
        /* Top Bar - FIXED */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 70px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-bar.glass {
            backdrop-filter: blur(40px);
            background: rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Main Layout */
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
            margin-top: 70px;
            transition: all 0.3s ease;
        }
        
        /* User List Panel */
        .user-panel {
            width: 320px;
            min-width: 320px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            transition: all 0.3s ease;
        }
        
        .user-panel.mobile-hidden {
            transform: translateX(-100%);
        }
        
        .user-panel-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .user-list {
            padding: 10px 0;
            max-height: calc(100vh - 200px);
        }
        
        .user-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            border-radius: 12px;
            margin: 4px 12px;
        }
        
        .user-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(4px);
        }
        
        .user-item.active {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.3), rgba(236, 72, 153, 0.3));
            border: 1px solid rgba(99, 102, 241, 0.5);
        }
        
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .user-info {
            flex: 1;
            min-width: 0;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-status {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 2px;
        }
        
        .unread-badge {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }
        .chat-messages.scrollbar-thin::-webkit-scrollbar { 
            width: 6px; 
        }
        
        /* Message Styles */
        .message-bubble {
            max-width: 70%;
            margin-bottom: 16px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-own {
            margin-left: auto;
        }
        
        .message-other {
            margin-right: auto;
        }
        
        .message-content {
            padding: 12px 16px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            word-wrap: break-word;
            line-height: 1.5;
        }
        
        .message-own .message-content {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(236, 72, 153, 0.3));
            border: 1px solid rgba(99, 102, 241, 0.4);
        }
        
        .message-other .message-content {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 12px;
        }
        
        .message-sender {
            font-weight: 600;
            font-size: 14px;
        }
        
        .message-time {
            opacity: 0.6;
            font-size: 11px;
        }
        
        .message-text {
            font-size: 15px;
            margin-bottom: 4px;
        }
        
        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
            margin: 0 20px 20px;
        }
        
        .typing-indicator.show {
            opacity: 1;
        }
        
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(2) { 
            animation-delay: 0.2s; 
        }
        .typing-dot:nth-child(3) { 
            animation-delay: 0.4s; 
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        /* Input Area */
        .input-area {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            bottom: 0;
        }
        
        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            max-width: 100%;
        }
        
        .emoji-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: rgba(255, 255, 0, 0.2);
            border: 1px solid rgba(255, 255, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        
        .emoji-btn:hover {
            background: rgba(255, 255, 0, 0.3);
            transform: scale(1.05);
            border-color: rgba(255, 255, 0, 0.5);
        }
        
        .emoji-btn i {
            color: #FFD700 !important; /* Gold yellow for emoji icon */
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }
        
        .message-input {
            flex: 1;
            min-height: 48px;
            max-height: 120px;
            resize: none;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 12px 20px;
            color: white;
            font-size: 15px;
            line-height: 1.5;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .message-input:focus {
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        
        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Emoji Picker - FIXED & YELLOW THEMED */
        .emoji-picker {
            position: absolute;
            bottom: 100px;
            right: 40px;
            background: rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(40px);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 20px;
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 12px;
            max-width: 360px;
            width: 360px;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8) translateY(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.3);
        }
        .emoji-picker.scrollbar-thin::-webkit-scrollbar { 
            width: 6px; 
        }
        .emoji-picker.show {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(0);
        }
        
        .emoji-btn-picker {
            width: 36px;
            height: 36px;
            font-size: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid rgba(255, 215, 0, 0.3);
            background: rgba(255, 215, 0, 0.1);
            filter: drop-shadow(0 2px 8px rgba(255, 215, 0, 0.3));
        }
        
        .emoji-btn-picker:hover {
            background: rgba(255, 215, 0, 0.3) !important;
            transform: scale(1.2);
            border-color: rgba(255, 193, 7, 0.8);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }
        
        /* Ensure emojis stay vibrant */
        .emoji-btn-picker::selection,
        .message-text *::selection {
            background: rgba(255, 215, 0, 0.3);
        }
        
        /* Message text emojis get yellow glow */
        .message-text {
            text-shadow: 0 0 4px rgba(255, 215, 0, 0.3);
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .user-panel {
                position: fixed;
                left: 0;
                top: 70px;
                bottom: 0;
                z-index: 99;
                width: 280px;
                transform: translateX(-100%);
            }
            
            .user-panel.mobile-open {
                transform: translateX(0);
            }
            
            .chat-area {
                width: 100%;
            }
            
            .chat-area.mobile-overlay::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: -1;
            }
            
            .message-bubble {
                max-width: 85%;
            }
        }
        
        /* Global Chat Header */
        .global-chat-header {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.2));
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        /* Status Indicators */
        .status-online { 
            color: #10b981; 
        }
        .status-offline { 
            color: #6b7280; 
        }
        .status-typing { 
            color: #f59e0b; 
        }
        
        /* Char Counter */
        .char-counter {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 8px;
        }
        
        /* Mobile Menu Button */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            transition: background 0.2s ease;
        }
        
        .mobile-menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar glass">
        <div class="flex items-center gap-3">
            <i class="fas fa-comments text-2xl"></i>
            <div>
                <div class="text-white font-bold text-lg">Chatterbox Enterprise</div>
                <div class="text-emerald-400 text-sm font-medium flex items-center gap-2">
                    <div id="onlineCount" class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span id="onlineText">0 online</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="mobileMenuBtn" class="mobile-menu-btn">
                <i class="fas fa-users"></i>
            </button>
            <a href="/" class="p-2 text-white/70 hover:text-white hover:bg-white/10 rounded-xl transition-all duration-200">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- User Panel -->
        <div id="userPanel" class="user-panel">
            <div class="user-panel-header glass p-5 rounded-b-2xl mx-4 -mt-4 mb-4">
                <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
                    <i class="fas fa-users"></i> Online Users
                </h3>
                <div class="text-sm opacity-70">Click to start DM</div>
            </div>
            <div id="userList" class="user-list">
                <!-- Dynamic user list -->
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chatArea" class="chat-area">
            <!-- Chat Header -->
            <div id="chatHeader" class="chat-header glass">
                <div class="flex items-center gap-3 flex-1">
                    <div class="w-10 h-10 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center">
                        <span id="chatAvatar" class="font-bold text-sm">G</span>
                    </div>
                    <div>
                        <div id="chatTitle" class="font-bold text-lg">Global Chat</div>
                        <div id="chatSubtitle" class="text-sm opacity-70">Public channel</div>
                    </div>
                </div>
                <div id="chatActions" class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </div>

            <!-- Messages Container -->
            <div id="messagesContainer" class="chat-messages scrollbar-thin">
                <div class="text-center py-12 opacity-50">
                    <div class="text-2xl mb-4">👋 Welcome to Chatterbox Enterprise</div>
                    <div>Select a user or use Global Chat</div>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div id="typingIndicator" class="typing-indicator glass rounded-2xl">
                <div class="flex items-center gap-3">
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                    <span id="typingText" class="text-sm opacity-90">Someone is typing...</span>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <button id="emojiBtn" class="emoji-btn" title="Emoji">
                        <i class="fas fa-face-smile text-xl"></i>
                    </button>
                    <textarea 
                        id="messageInput" 
                        class="message-input" 
                        placeholder="Type your message... (Emojis supported!)"
                        maxlength="1000"
                    ></textarea>
                    <button id="sendBtn" class="send-btn" disabled>
                        <i class="fas fa-paper-plane text-xl"></i>
                    </button>
                </div>
                <div class="char-counter flex justify-between items-center mt-2">
                    <span id="charCount">0 / 1000</span>
                    <span class="text-xs opacity-60">Press Enter to send</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Emoji Picker -->
    <div id="emojiPicker" class="emoji-picker scrollbar-thin">
        <!-- Emojis populated by JS -->
    </div>

    <script>
        // ========================================
        // STATE MANAGEMENT
        // ========================================
        const state = {
            ws: null,
            username: null,
            currentChat: 'global', // 'global' or username
            users: new Set(),
            unreadDMs: new Map(),
            typingUsers: new Set(),
            reconnectAttempts: 0,
            maxReconnectAttempts: 5,
            isMobilePanelOpen: false
        };

        // DOM Elements
        const elements = {
            userPanel: document.getElementById('userPanel'),
            userList: document.getElementById('userList'),
            chatArea: document.getElementById('chatArea'),
            chatHeader: document.getElementById('chatHeader'),
            messagesContainer: document.getElementById('messagesContainer'),
            messageInput: document.getElementById('messageInput'),
            sendBtn: document.getElementById('sendBtn'),
            emojiBtn: document.getElementById('emojiBtn'),
            emojiPicker: document.getElementById('emojiPicker'),
            typingIndicator: document.getElementById('typingIndicator'),
            charCount: document.getElementById('charCount'),
            onlineCount: document.getElementById('onlineCount'),
            onlineText: document.getElementById('onlineText'),
            mobileMenuBtn: document.getElementById('mobileMenuBtn'),
            chatTitle: document.getElementById('chatTitle'),
            chatSubtitle: document.getElementById('chatSubtitle'),
            chatAvatar: document.getElementById('chatAvatar')
        };

        // Popular emojis (no external libs needed)
        const EMOJIS = [
            '😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰',
            '😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏',
            '😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠',
            '😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥',
            '😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','💥','❤️','🧡','💛','💚','💙',
            '💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','✨','⭐','🌟','💫','🔥',
            '👍','👎','👏','🙌','👋','✋','🤚','🖐️','✌️','🤟','🤘','👌','🤌','🤏','👈','👉',
            '👆','🖕','👇','☝️','🙏','🚀','🌙','☀️','⭐','🎉','🎊','🎈','🎁','🎂','🍕','🍔'
        ];

        // ========================================
        // INITIALIZATION
        // ========================================
        async function init() {
            // Get username from URL
            const urlParams = new URLSearchParams(window.location.search);
            state.username = urlParams.get('username');
            
            if (!state.username) {
                alert('Please login first!');
                window.location.href = '/';
                return;
            }

            // Initialize UI
            setupEventListeners();
            populateEmojiPicker();
            connectWebSocket();
            updateOnlineCount();
            
            // Focus input
            elements.messageInput.focus();
        }

        // ========================================
        // EVENT LISTENERS
        // ========================================
        function setupEventListeners() {
            // Message input
            elements.messageInput.addEventListener('input', handleInput);
            elements.messageInput.addEventListener('keydown', handleKeydown);
            
            // Send button
            elements.sendBtn.addEventListener('click', sendMessage);
            
            // Emoji button
            elements.emojiBtn.addEventListener('click', toggleEmojiPicker);
            
            // Mobile menu
            elements.mobileMenuBtn.addEventListener('click', toggleMobilePanel);
            
            // Window resize
            window.addEventListener('resize', handleResize);
            
            // Click outside emoji picker
            document.addEventListener('click', handleOutsideClick);
        }

        function handleInput(e) {
            const value = e.target.value;
            const length = value.length;
            
            elements.charCount.textContent = `${length} / 1000`;
            elements.sendBtn.disabled = !value.trim();
            
            // Auto-resize textarea
            e.target.style.height = 'auto';
            e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
            
            // Send typing indicator
            if (state.ws && value.trim()) {
                state.ws.send(JSON.stringify({
                    type: 'typing',
                    target: state.currentChat
                }));
            }
        }

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const message = elements.messageInput.value.trim();
            if (!message || !state.ws) return;

            // Send via WebSocket
            const payload = {
                type: 'message',
                content: message,
                target: state.currentChat
            };
            
            state.ws.send(JSON.stringify(payload));
            elements.messageInput.value = '';
            handleInput({ target: elements.messageInput });
        }

        function toggleEmojiPicker() {
            const isVisible = elements.emojiPicker.classList.contains('show');
            elements.emojiPicker.classList.toggle('show', !isVisible);
        }

        function insertEmojiAtCursor(emoji) {
            const input = elements.messageInput;
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const value = input.value;
            
            const newValue = value.substring(0, start) + emoji + value.substring(end);
            input.value = newValue;
            
            // Set cursor after emoji
            const newPos = start + emoji.length;
            input.setSelectionRange(newPos, newPos);
            
            input.focus();
            handleInput({ target: input });
            toggleEmojiPicker();
        }

        function handleOutsideClick(e) {
            if (!elements.emojiBtn.contains(e.target) && !elements.emojiPicker.contains(e.target)) {
                elements.emojiPicker.classList.remove('show');
            }
        }

        function toggleMobilePanel() {
            state.isMobilePanelOpen = !state.isMobilePanelOpen;
            elements.userPanel.classList.toggle('mobile-open', state.isMobilePanelOpen);
            elements.chatArea.classList.toggle('mobile-overlay', state.isMobilePanelOpen);
        }

        function handleResize() {
            if (window.innerWidth > 768) {
                elements.userPanel.classList.remove('mobile-hidden', 'mobile-open');
                elements.chatArea.classList.remove('mobile-overlay');
                state.isMobilePanelOpen = false;
            }
        }

        // ========================================
        // UI UPDATES
        // ========================================
        function populateEmojiPicker() {
            elements.emojiPicker.innerHTML = EMOJIS.map(emoji => 
                `<div class="emoji-btn-picker" onclick="insertEmojiAtCursor('${emoji}')">${emoji}</div>`
            ).join('');
        }

        function updateUserList(users) {
            state.users = new Set(users);
            renderUserList();
        }

        function renderUserList() {
            elements.userList.innerHTML = `
                ${Array.from(state.users).filter(u => u !== state.username).map(username => {
                    const unreadCount = state.unreadDMs.get(username) || 0;
                    const avatar = username.charAt(0).toUpperCase();
                    const isActive = state.currentChat === username;
                    
                    return `
                        <div class="user-item ${isActive ? 'active' : ''}" 
                             onclick="switchChat('${username}')">
                           <div class="user-avatar">${avatar}</div>
                           <div class="user-info">
                               <div class="user-name">${username}</div>
                               <div class="user-status status-online">Online</div>
                           </div>
                           ${unreadCount > 0 ? 
                               `<div class="unread-badge">${unreadCount}</div>` : ''
                           }
                        </div>
                    `;
                }).join('')}
            `;
        }

        function switchChat(target) {
            state.currentChat = target;
            renderChatHeader(target);
            loadChatHistory(target);
            elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
            
            // Clear unread count
            state.unreadDMs.set(target, 0);
            renderUserList();
        }

        function renderChatHeader(target) {
            if (target === 'global') {
                elements.chatTitle.textContent = 'Global Chat';
                elements.chatSubtitle.textContent = 'Public channel';
                elements.chatAvatar.textContent = 'G';
                elements.chatHeader.classList.add('global-chat-header');
            } else {
                elements.chatTitle.textContent = target;
                elements.chatSubtitle.textContent = 'Direct Message';
                elements.chatAvatar.textContent = target.charAt(0).toUpperCase();
                elements.chatHeader.classList.remove('global-chat-header');
            }
        }

        async function loadChatHistory(target) {
            // Fetch chat history from backend (implement endpoint if needed)
            if (target === 'global') {
                try {
                    const response = await fetch(`/chat-history?target=${target}`);
                    const messages = await response.json();
                    displayHistory(messages);
                } catch (e) {
                    console.log('Using global history from WS');
                }
            }
        }

        function addMessage(username, message, timestamp, isOwn = false, isDM = false) {
            const time = new Date(timestamp).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
            const bubbleClass = isOwn ? 'message-bubble message-own' : 'message-bubble message-other';
            const sender = isOwn ? 'You' : username;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = bubbleClass;
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${isOwn || isDM ? '' : `
                        <div class="message-header">
                            <span class="message-sender">${sender}</span>
                            <span class="message-time">${time}</span>
                        </div>
                    `}
                    <div class="message-text">${message}</div>
                    <div class="message-time mt-1 opacity-60 text-xs">${time}</div>
                </div>
            `;
            
            elements.messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function showTypingIndicator(username) {
            state.typingUsers.add(username);
            updateTypingIndicator();
        }

        function hideTypingIndicator(username) {
            state.typingUsers.delete(username);
            updateTypingIndicator();
        }

        function updateTypingIndicator() {
            if (state.typingUsers.size === 0) {
                elements.typingIndicator.classList.remove('show');
                return;
            }
            
            const typingText = state.typingUsers.size === 1 
                ? `${Array.from(state.typingUsers)[0]} is typing...`
                : `${state.typingUsers.size} users are typing...`;
            
            elements.typingText.textContent = typingText;
            elements.typingIndicator.classList.add('show');
        }

        function scrollToBottom() {
            elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
        }

        // ========================================
        // WEBSOCKET & API
        // ========================================
       function connectWebSocket() {

    state.ws = new WebSocket(
        `ws://${window.location.host}/ws/${encodeURIComponent(state.username)}`
    );

    state.ws.onopen = function() {
        console.log('WebSocket connected');
        state.reconnectAttempts = 0;
    };

    state.ws.onmessage = function(event) {
        const data = JSON.parse(event.data);
        console.log("Received:", data); // Debug

        switch(data.type) {

            case 'history':
                displayHistory(data.messages);
                break;

            case 'message':
                addMessage(
                    data.username,
                    data.message,
                    data.timestamp,
                    data.username === state.username
                );
                break;

            case 'system':
                addSystemMessage(data.message);
                break;

            case 'moderation':
                addSystemMessage("⚠️ " + data.message, 'text-orange-400');
                break;

            case 'warning':
                addSystemMessage("⚠️ " + data.message, 'text-yellow-400');
                break;

            case 'banned':
                addSystemMessage("🚫 " + data.message, 'text-red-500');
                elements.messageInput.disabled = true;
                elements.sendBtn.disabled = true;
                state.maxReconnectAttempts = 0;
                state.ws.close();
                break;

            case 'user_list':
                updateUserList(data.users);
                break;
        }
    };

    state.ws.onclose = function(event) {
    console.log('WebSocket disconnected');
   if (state.maxReconnectAttempts === 0) {
        console.log("User permanently banned. No reconnect.");
        return;
    }

    if (state.reconnectAttempts < state.maxReconnectAttempts) {
        setTimeout(() => {
            state.reconnectAttempts++;
            connectWebSocket();
        }, 2000 * state.reconnectAttempts);
    }
};

    state.ws.onerror = function(error) {
        console.error('WebSocket error:', error);
    };
}

        function handleWebSocketMessage(data) {
            switch(data.type) {
                case 'history':
                    displayHistory(data.messages);
                    break;
                case 'message':
                    addMessage(data.username, data.message, data.timestamp, 
                          data.username === state.username, data.isDM);
                    if (data.target && data.target !== state.currentChat && data.target !== 'global') {
                        state.unreadDMs.set(data.target, (state.unreadDMs.get(data.target) || 0) + 1);
                        renderUserList();
                    }
                    break;
                case 'system':
                    addSystemMessage(data.message, 'text-blue-400');
                    break;
                case 'user_list':
                    updateUserList(data.users);
                    break;
                case 'user_joined':
                    updateUserList(data.users);
                    addSystemMessage(`${data.username} joined`, 'text-emerald-400');
                    break;
                case 'user_left':
                    updateUserList(data.users);
                    addSystemMessage(`${data.username} left`, 'text-orange-400');
                    break;
                case 'typing':
                    if (data.isTyping) {
                        showTypingIndicator(data.username);
                    } else {
                        hideTypingIndicator(data.username);
                    }
                    break;
            }
        }

        function displayHistory(messages) {
            elements.messagesContainer.innerHTML = '';
            messages.forEach(msg => {
                addMessage(msg.username, msg.message, msg.timestamp, 
                      msg.username === state.username, msg.isDM || false);
            });
            scrollToBottom();
        }

        function addSystemMessage(message, colorClass = 'text-blue-400') {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'text-center py-4 my-6';
            messageDiv.innerHTML = `
                <span class="${colorClass} font-semibold text-sm bg-black/30 px-6 py-3 rounded-full backdrop-filter blur(20px) border border-white/20 text-xs">
                    ${message}
                </span>
            `;
            elements.messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        async function updateOnlineCount() {
            try {
                const response = await fetch('/online');
                const data = await response.json();
                elements.onlineText.textContent = `${data.count} online`;
            } catch (e) {
                console.error('Failed to update online count');
            }
        }

        // Expose functions for onclick handlers
        window.switchChat = switchChat;
        window.insertEmojiAtCursor = insertEmojiAtCursor;

        // ========================================
        // START APP
        // ========================================
        init();
        setInterval(updateOnlineCount, 3000);
    </script>
</body>
</html>
